<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <div id="display">0</div>

  <div class="buttons">
    <button class="gray" onclick="backspace()">⌫</button>
    <button class="gray" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="percentage()">%</button>
    <button class="orange" onclick="setOperator('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="setOperator('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="setOperator('-')">−</button>
    

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="setOperator('+')">+</button>

    <button onclick="sqrt()">√</button>
    <button onclick="append('0')">0</button>
    <button onclick="appendDot('.')">.</button>
    <button class="orange" onclick="equals()">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
